[pytest]
testpaths = tests/pytest/cases
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short --strict-markers

markers =
    portal: Tests requiring portal login (portal-dev.unitpulse.ai)
    website: Tests targeting the public website (website-dev.unitpulse.ai)
    smoke: Smoke/sanity tests
    slow: Tests taking > 60 seconds
    aichat: AI Chat related tests
    tours: Tours module tests
    asyncio: async tests
    timeout: test timeout marker
